image: mcr.microsoft.com/playwright:v1.56.1-jammy

stages:
  - test

variables:
  NODE_ENV: test
  PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .cache/ms-playwright/

before_script:
  - npm ci

lint:
  stage: test
  script:
    - npm run lint

tests:
  stage: test
  script:
    - mkdir -p reports
    - npm test -- --reporter=list
  artifacts:
    when: always
    paths:
      - playwright-report
      - reports
      - test-results
    expire_in: 1 week
